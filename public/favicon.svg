<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Train body -->
  <rect x="4" y="10" width="40" height="24" rx="10" fill="#A8E6CF"/>
  <rect x="4" y="10" width="40" height="24" rx="10" fill="url(#g)"/>
  <!-- Windows -->
  <rect x="10" y="22" width="8" height="6" rx="2" fill="white" opacity="0.85"/>
  <rect x="20" y="22" width="8" height="6" rx="2" fill="white" opacity="0.85"/>
  <rect x="30" y="22" width="8" height="6" rx="2" fill="white" opacity="0.85"/>
  <!-- Eyes -->
  <circle cx="18" cy="17" r="2" fill="#3D5A47"/>
  <circle cx="30" cy="17" r="2" fill="#3D5A47"/>
  <!-- Smile -->
  <path d="M21 20 Q24 23 27 20" stroke="#3D5A47" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Bottom shadow -->
  <rect x="4" y="30" width="40" height="4" rx="2" fill="#6BB896"/>
  <!-- Wheels -->
  <circle cx="14" cy="38" r="4" fill="#888" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="24" cy="38" r="4" fill="#888" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="34" cy="38" r="4" fill="#888" stroke="#aaa" stroke-width="1.5"/>
  <!-- Track -->
  <rect x="2" y="41" width="44" height="2" rx="1" fill="#D4C9B8"/>
  <defs>
    <linearGradient id="g" x1="4" y1="10" x2="44" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A8E6CF"/>
      <stop offset="1" stop-color="#7FCFAC"/>
    </linearGradient>
  </defs>
</svg>
